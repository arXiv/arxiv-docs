site_name: arXiv info
site_url: https://info.arxiv.org/
docs_dir: source

# Forces links in the format /help/index.html instead of mkdocs default of /help
# This allows us serve as totally static with no support from a web server
use_directory_urls: false

plugins:
  - search
  - literate-nav:
      nav_file: SUMMARY.md
      implicit_index: true
  - redirects:
      redirect_maps:
        about/governance.md: about/governance/index.md
        about/arXiv_bylaws.md: about/governance/operational_guidelines.md
hooks:
  - hooks/a11y.py
theme:
  name: material
  features:
    - content.tooltips
    - navigation.path
    - navigation.indexes
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  logo: assets/arxiv-logo-one-color-white.svg
  custom_dir: overrides
  favicon: assets/favicon.png
extra_css:
  - stylesheets/extra.css
extra:
  # Per-environment roots for the spinout chrome (ARXIVCE-4426). Defaults are
  # production; a dev build overrides them via env vars so info.dev.arxiv.org
  # loads the dev static assets and keeps header/footer links inside dev, e.g.:
  #   BASE_STATIC=https://static.dev.arxiv.org/static/base/1.0.1 \
  #   ARXIV_HOST=https://dev.arxiv.org INFO_HOST=https://info.dev.arxiv.org \
  #   mkdocs build
  homepage: !ENV [ARXIV_HOST, 'https://arxiv.org']
  base_static: !ENV [BASE_STATIC, 'https://static.arxiv.org/static/base/1.0.1']
  arxiv_host: !ENV [ARXIV_HOST, 'https://arxiv.org']
  info_host: !ENV [INFO_HOST, 'https://info.arxiv.org']
markdown_extensions:
  - attr_list
  - md_in_html
  - abbr
  - pymdownx.snippets

repo_name: GitHub
repo_url: https://github.com/arXiv/arxiv-docs
edit_uri: blob/develop/source
